name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install pytest
      - run: python -m pytest
      - run: python skills/image-prompt-architect/scripts/prompt_lint.py tests/fixtures/good_seven_layer.txt --architecture seven-layer --model generic --strict
      - run: python skills/image-prompt-architect/scripts/prompt_lint.py tests/fixtures/good_system_series.txt --architecture system --model generic --strict
      - run: python skills/image-prompt-architect/scripts/prompt_lint.py tests/fixtures/good_midjourney.txt --model midjourney --strict
      - run: |
          if python skills/image-prompt-architect/scripts/prompt_lint.py tests/fixtures/bad_flux_negative.txt --model flux --strict; then
            echo "bad_flux_negative unexpectedly passed strict lint"
            exit 1
          fi
          if python skills/image-prompt-architect/scripts/prompt_lint.py tests/fixtures/bad_midjourney_negative_block.txt --model midjourney --strict; then
            echo "bad_midjourney_negative_block unexpectedly passed strict lint"
            exit 1
          fi
          if python skills/image-prompt-architect/scripts/prompt_lint.py tests/fixtures/bad_empty_heading_skeleton.txt --architecture seven-layer --strict; then
            echo "bad_empty_heading_skeleton unexpectedly passed strict lint"
            exit 1
          fi
