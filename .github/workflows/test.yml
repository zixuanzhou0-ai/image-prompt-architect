name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install pytest
      - run: python -m pytest
      - run: python scripts/check_trigger_cases.py
      - run: python evals/run_prompt_eval.py
      - name: Strict lint good fixtures
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          script = Path("skills/image-prompt-architect/scripts/prompt_lint.py")

          def model_for(name: str) -> str:
              if "midjourney" in name:
                  return "midjourney"
              if "flux" in name:
                  return "flux"
              if "gpt_image" in name:
                  return "gpt-image"
              if "dreamina" in name or "chinese" in name or "bilingual" in name:
                  return "dreamina"
              return "generic"

          def architecture_for(name: str) -> str:
              if "system" in name:
                  return "system"
              if any(term in name for term in ("midjourney", "flux", "gpt_image")):
                  return "compact"
              if any(term in name for term in ("seven_layer", "heading", "template", "keyword_stuffing")):
                  return "seven-layer"
              if "short_label" in name:
                  return "seven-layer"
              return "auto"

          for fixture in sorted(Path("tests/fixtures").glob("good_*.txt")):
              cmd = [
                  sys.executable,
                  str(script),
                  str(fixture),
                  "--architecture",
                  architecture_for(fixture.stem),
                  "--model",
                  model_for(fixture.stem),
                  "--strict",
              ]
              subprocess.run(cmd, check=True)
          PY
      - name: Strict lint bad fixtures
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          script = Path("skills/image-prompt-architect/scripts/prompt_lint.py")

          def model_for(name: str) -> str:
              if "midjourney" in name:
                  return "midjourney"
              if "flux" in name:
                  return "flux"
              if "gpt_image" in name:
                  return "gpt-image"
              if "dreamina" in name or "chinese" in name or "bilingual" in name:
                  return "dreamina"
              return "generic"

          def architecture_for(name: str) -> str:
              if "system" in name:
                  return "system"
              if any(term in name for term in ("midjourney", "flux", "gpt_image")):
                  return "compact"
              if any(term in name for term in ("seven_layer", "heading", "template", "keyword_stuffing")):
                  return "seven-layer"
              if "short_label" in name:
                  return "seven-layer"
              return "auto"

          failed = []
          for fixture in sorted(Path("tests/fixtures").glob("bad_*.txt")):
              cmd = [
                  sys.executable,
                  str(script),
                  str(fixture),
                  "--architecture",
                  architecture_for(fixture.stem),
                  "--model",
                  model_for(fixture.stem),
                  "--strict",
              ]
              result = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              if result.returncode == 0:
                  failed.append(str(fixture))
          if failed:
              print("Bad fixtures unexpectedly passed strict lint:")
              print("\n".join(failed))
              sys.exit(1)
          PY
      - name: Strict lint warning fixtures
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import subprocess
          import sys

          script = Path("skills/image-prompt-architect/scripts/prompt_lint.py")

          def model_for(name: str) -> str:
              if "midjourney" in name:
                  return "midjourney"
              if "flux" in name:
                  return "flux"
              if "gpt_image" in name:
                  return "gpt-image"
              if "dreamina" in name or "chinese" in name or "bilingual" in name:
                  return "dreamina"
              return "generic"

          def architecture_for(name: str) -> str:
              if "system" in name:
                  return "system"
              if any(term in name for term in ("midjourney", "flux", "gpt_image")):
                  return "compact"
              if any(term in name for term in ("seven_layer", "heading", "template", "keyword_stuffing", "short_label")):
                  return "seven-layer"
              return "auto"

          failed = []
          for fixture in sorted(Path("tests/fixtures").glob("warn_*.txt")):
              cmd = [
                  sys.executable,
                  str(script),
                  str(fixture),
                  "--architecture",
                  architecture_for(fixture.stem),
                  "--model",
                  model_for(fixture.stem),
                  "--format",
                  "json",
                  "--strict",
              ]
              result = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              if result.returncode != 0:
                  failed.append(f"{fixture}: strict failed")
                  continue
              data = json.loads(result.stdout)
              if data["critical"] or not data["warnings"]:
                  failed.append(f"{fixture}: expected warnings and no critical failures")
          if failed:
              print("Warning fixtures failed policy:")
              print("\n".join(failed))
              sys.exit(1)
          PY
